name: Publish NuGet package

on:
  repository_dispatch:
    types: [publish-package]
  workflow_dispatch:
    inputs:
      repository:
        description: Source repository to publish, in owner/name form.
        required: true
        type: string
      ref:
        description: Source tag or ref to publish.
        required: true
        type: string
      solution:
        description: Optional solution path in the source repository.
        required: false
        type: string
      package_project:
        description: Optional package project path in the source repository.
        required: false
        type: string
      global_json:
        description: Optional global.json path in the source repository.
        required: false
        default: global.json
        type: string

permissions: {}

jobs:
  build:
    name: Build untrusted package source
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      repository: ${{ steps.request.outputs.repository }}
      ref: ${{ steps.request.outputs.ref }}
      version: ${{ steps.request.outputs.version }}
    env:
      SOURCE_REPOSITORY: ${{ github.event.client_payload.repository || github.event.inputs.repository }}
      SOURCE_REF: ${{ github.event.client_payload.ref || github.event.inputs.ref }}
      SOURCE_SOLUTION: ${{ github.event.client_payload.solution || github.event.inputs.solution }}
      SOURCE_PACKAGE_PROJECT: ${{ github.event.client_payload['package-project'] || github.event.client_payload.package_project || github.event.inputs.package_project }}
      SOURCE_GLOBAL_JSON: ${{ github.event.client_payload['global-json'] || github.event.client_payload.global_json || github.event.inputs.global_json || 'global.json' }}

    steps:
      - name: Checkout trusted publisher controls
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: AtyaLibraries/publisher
          ref: ${{ github.workflow_sha }}
          path: trusted-publisher
          persist-credentials: false

      - name: Validate publish request
        id: request
        shell: pwsh
        run: >-
          ./trusted-publisher/scripts/Validate-PublishRequest.ps1
          -Repository $env:SOURCE_REPOSITORY
          -Ref $env:SOURCE_REF
          -Solution $env:SOURCE_SOLUTION
          -PackageProject $env:SOURCE_PACKAGE_PROJECT
          -GlobalJson $env:SOURCE_GLOBAL_JSON

      - name: Checkout package source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: ${{ steps.request.outputs.repository }}
          ref: ${{ steps.request.outputs.ref }}
          fetch-depth: 0
          path: source
          persist-credentials: false

      - name: Verify immutable release ref
        working-directory: source
        shell: bash
        env:
          RELEASE_REF: ${{ steps.request.outputs.ref }}
        run: |
          set -euo pipefail
          git show-ref --verify --quiet "$RELEASE_REF" || {
            echo '::error::The requested release tag was not fetched.'
            exit 1
          }
          test "$(git rev-list -n 1 "$RELEASE_REF")" = "$(git rev-parse HEAD)" || {
            echo '::error::The checked-out commit does not match the requested release tag.'
            exit 1
          }

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          global-json-file: source/${{ steps.request.outputs.global_json }}

      - name: Locate package inputs
        id: package_inputs
        working-directory: source
        shell: pwsh
        env:
          REQUEST_SOLUTION: ${{ steps.request.outputs.solution }}
          REQUEST_PACKAGE_PROJECT: ${{ steps.request.outputs.package_project }}
        run: |
          $ErrorActionPreference = 'Stop'
          Import-Module ../trusted-publisher/scripts/PublisherSecurity.psm1 -Force
          $solution = $env:REQUEST_SOLUTION
          if ([string]::IsNullOrWhiteSpace($solution)) {
            $solutions = @(Get-ChildItem -LiteralPath . -Filter *.sln -File)
            if ($solutions.Count -ne 1) {
              throw "Expected exactly one solution file; found $($solutions.Count)."
            }
            $solution = $solutions[0].Name
          }

          $packageProject = $env:REQUEST_PACKAGE_PROJECT
          if ([string]::IsNullOrWhiteSpace($packageProject)) {
            if (-not (Test-Path -LiteralPath src -PathType Container)) {
              throw 'Expected a src directory containing one package project.'
            }
            $packageProjects = @(Get-ChildItem -LiteralPath src -Recurse -Filter *.csproj -File)
            if ($packageProjects.Count -ne 1) {
              throw "Expected exactly one package project under src; found $($packageProjects.Count)."
            }
            $packageProject = (Resolve-Path -Relative -LiteralPath $packageProjects[0].FullName).Replace('\', '/').TrimStart('./')
          }

          $solution = ConvertTo-SafeRelativePath -Path $solution -Name 'solution'
          $packageProject = ConvertTo-SafeRelativePath -Path $packageProject -Name 'package project'

          if (-not (Test-Path -LiteralPath $solution -PathType Leaf) -or
              -not (Test-Path -LiteralPath $packageProject -PathType Leaf)) {
            throw 'A requested package input does not exist in the source checkout.'
          }
          Add-Content -LiteralPath $env:GITHUB_OUTPUT -Value "solution=$solution"
          Add-Content -LiteralPath $env:GITHUB_OUTPUT -Value "package_project=$packageProject"

      - name: Build and pack
        uses: AtyaLibraries/github-workflows/.github/actions/build-pack-nuget@12bd0f142d443058477bcb167bad4b4f063de994
        with:
          solution: source/${{ steps.package_inputs.outputs.solution }}
          package-project: source/${{ steps.package_inputs.outputs.package_project }}
        env:
          PACKAGE_VERSION: ${{ steps.request.outputs.version }}
          MINVERVERSIONOVERRIDE: ${{ steps.request.outputs.version }}

      - name: Stage bounded release bundle
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $packages = @(Get-ChildItem -LiteralPath artifacts/packages -Filter *.nupkg -File |
            Where-Object { -not $_.Name.EndsWith('.symbols.nupkg', [StringComparison]::OrdinalIgnoreCase) })
          $symbolPackages = @(Get-ChildItem -LiteralPath artifacts/packages -Filter *.snupkg -File)
          $sboms = @(Get-ChildItem -LiteralPath artifacts/packages -Filter package.sbom.cdx.json -File)
          if ($packages.Count -ne 1) {
            throw "Expected exactly one package artifact; found $($packages.Count)."
          }
          if ($symbolPackages.Count -ne 1) {
            throw "Expected exactly one symbol package artifact; found $($symbolPackages.Count)."
          }
          if ($sboms.Count -ne 1) {
            throw "Expected exactly one package SBOM artifact; found $($sboms.Count)."
          }
          $files = @($packages[0], $symbolPackages[0], $sboms[0])
          if (@($files | Where-Object {
              $_.Length -le 0 -or ($_.Extension -in @('.nupkg', '.snupkg') -and $_.Length -gt 268435456) -or
              ($_.Name -ceq 'package.sbom.cdx.json' -and $_.Length -gt 8388608) -or
              ($_.Attributes -band [IO.FileAttributes]::ReparsePoint)
            }).Count -ne 0 -or ($files | Measure-Object Length -Sum).Sum -gt 545259520) {
            throw 'The release bundle is empty, unsafe, or exceeds a publication boundary.'
          }
          New-Item -ItemType Directory -Path release-bundle | Out-Null
          Copy-Item -LiteralPath $packages[0].FullName -Destination release-bundle/package.nupkg
          Copy-Item -LiteralPath $symbolPackages[0].FullName -Destination release-bundle/package.snupkg
          Copy-Item -LiteralPath $sboms[0].FullName -Destination release-bundle/package.sbom.cdx.json

      - name: Upload bounded release bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-bundle-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            release-bundle/package.nupkg
            release-bundle/package.snupkg
            release-bundle/package.sbom.cdx.json
          if-no-files-found: error
          include-hidden-files: false
          retention-days: 1

  publish:
    name: Validate and publish trusted artifact
    needs: build
    runs-on: ubuntu-latest
    environment: production
    permissions:
      attestations: write
      contents: read
      id-token: write

    steps:
      - name: Checkout trusted publisher controls
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: AtyaLibraries/publisher
          ref: ${{ github.workflow_sha }}
          path: trusted-publisher
          persist-credentials: false

      - name: Download bounded release bundle
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-bundle-${{ github.run_id }}-${{ github.run_attempt }}
          path: inbound

      - name: Validate, complete, and seal release bundle
        id: release
        shell: pwsh
        env:
          REQUESTED_REPOSITORY: ${{ needs.build.outputs.repository }}
          REQUESTED_REF: ${{ needs.build.outputs.ref }}
          REQUESTED_VERSION: ${{ needs.build.outputs.version }}
        run: >-
          ./trusted-publisher/scripts/Seal-ReleaseBundle.ps1
          -BundlePath ./inbound
          -RequestedRepository $env:REQUESTED_REPOSITORY
          -RequestedVersion $env:REQUESTED_VERSION
          -RequestedRef $env:REQUESTED_REF
          -AllowlistPath ./trusted-publisher/policy/publisher-allowlist.json

      - name: Retain complete sealed release bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sealed-release-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            inbound/package.nupkg
            inbound/package.snupkg
            inbound/package.sbom.cdx.json
            inbound/release-manifest.json
          if-no-files-found: error
          include-hidden-files: false
          retention-days: 90

      - name: Attest complete sealed release bundle
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        with:
          subject-path: |
            ./inbound/package.nupkg
            ./inbound/package.snupkg
            ./inbound/package.sbom.cdx.json
            ./inbound/release-manifest.json

      - name: Verify attested bytes before credential acquisition
        shell: pwsh
        run: >-
          ./trusted-publisher/scripts/Verify-SealedReleaseBundle.ps1
          -BundlePath ./inbound
          -ExpectedPackageId '${{ steps.release.outputs.package_id }}'
          -ExpectedVersion '${{ steps.release.outputs.version }}'
          -ExpectedRepository '${{ steps.release.outputs.repository }}'
          -ExpectedRef '${{ steps.release.outputs.ref }}'
          -ExpectedPolicyVersion '${{ steps.release.outputs.policy_version }}'

      - name: Log in to NuGet.org
        id: login
        uses: NuGet/login@ebc737b6fc418a6ca0073cf116ec8dc156d8b81e # v1
        with:
          user: ArsenAsulyan

      - name: Push package
        shell: pwsh
        env:
          NUGET_API_KEY: ${{ steps.login.outputs.NUGET_API_KEY }}
        run: |
          $ErrorActionPreference = 'Stop'
          ./trusted-publisher/scripts/Verify-SealedReleaseBundle.ps1 `
            -BundlePath ./inbound `
            -ExpectedPackageId '${{ steps.release.outputs.package_id }}' `
            -ExpectedVersion '${{ steps.release.outputs.version }}' `
            -ExpectedRepository '${{ steps.release.outputs.repository }}' `
            -ExpectedRef '${{ steps.release.outputs.ref }}' `
            -ExpectedPolicyVersion '${{ steps.release.outputs.policy_version }}'
          dotnet nuget push ./inbound/package.nupkg `
            --api-key $env:NUGET_API_KEY `
            --source https://api.nuget.org/v3/index.json
          if ($LASTEXITCODE -ne 0) { throw 'NuGet publication did not complete successfully.' }
