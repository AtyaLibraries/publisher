name: Publish NuGet package

on:
  repository_dispatch:
    types: [publish-package]
  workflow_dispatch:
    inputs:
      repository:
        description: Source repository to publish, in owner/name form.
        required: true
        type: string
      ref:
        description: Source tag or ref to publish.
        required: true
        type: string
      solution:
        description: Optional solution path in the source repository.
        required: false
        type: string
      package_project:
        description: Optional package project path in the source repository.
        required: false
        type: string
      global_json:
        description: Optional global.json path in the source repository.
        required: false
        default: global.json
        type: string

permissions:
  id-token: write
  attestations: write
  contents: read

jobs:
  publish:
    name: Publish NuGet package
    runs-on: ubuntu-latest
    environment: production
    env:
      SOURCE_REPOSITORY: ${{ github.event.client_payload.repository || github.event.inputs.repository }}
      SOURCE_REF: ${{ github.event.client_payload.ref || github.event.inputs.ref }}
      SOURCE_SOLUTION: ${{ github.event.client_payload.solution || github.event.inputs.solution }}
      SOURCE_PACKAGE_PROJECT: ${{ github.event.client_payload['package-project'] || github.event.client_payload.package_project || github.event.inputs.package_project }}
      SOURCE_GLOBAL_JSON: ${{ github.event.client_payload['global-json'] || github.event.client_payload.global_json || github.event.inputs.global_json || 'global.json' }}

    steps:
      - name: Validate publish request
        shell: bash
        run: |
          test -n "$SOURCE_REPOSITORY"
          test -n "$SOURCE_REF"

          case "$SOURCE_REPOSITORY" in
            AtyaLibraries/*) ;;
            *)
              echo "::error::Refusing non-AtyaLibraries repository '$SOURCE_REPOSITORY'."
              exit 1
              ;;
          esac

          case "$SOURCE_REF" in
            v*|refs/tags/v*) ;;
            *)
              echo "::error::Refusing non-release ref '$SOURCE_REF'."
              exit 1
              ;;
          esac

      - name: Checkout package source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: ${{ env.SOURCE_REPOSITORY }}
          ref: ${{ env.SOURCE_REF }}
          fetch-depth: 0
          # Public package repos work with the default token. If a private package
          # repo becomes a target, add a checkout token input at that time.

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          global-json-file: ${{ env.SOURCE_GLOBAL_JSON }}

      - name: Locate package inputs
        id: package_inputs
        shell: pwsh
        run: |
          $solution = $env:SOURCE_SOLUTION

          if ([string]::IsNullOrWhiteSpace($solution)) {
            $solutions = @(Get-ChildItem -LiteralPath . -Filter *.sln -File)

            if ($solutions.Count -ne 1) {
              throw "Expected exactly one solution file, found $($solutions.Count)."
            }

            $solution = "./$($solutions[0].Name)"
          }

          $packageProject = $env:SOURCE_PACKAGE_PROJECT

          if ([string]::IsNullOrWhiteSpace($packageProject)) {
            $srcPath = Join-Path (Get-Location) 'src'

            if (-not (Test-Path -LiteralPath $srcPath)) {
              throw "Expected a src directory containing one package project."
            }

            $packageProjects = @(Get-ChildItem -LiteralPath $srcPath -Recurse -Filter *.csproj -File)

            if ($packageProjects.Count -ne 1) {
              throw "Expected exactly one package project under src, found $($packageProjects.Count)."
            }

            $packageProject = (Resolve-Path -Relative -Path $packageProjects[0].FullName).Replace('\', '/')
          }

          Add-Content -Path $env:GITHUB_OUTPUT -Value "solution=$solution"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "package_project=$packageProject"

      - name: Determine package version
        shell: bash
        run: |
          package_version=""

          case "$SOURCE_REF" in
            refs/tags/v*)
              package_version="${SOURCE_REF#refs/tags/v}"
              ;;
            v*)
              package_version="${SOURCE_REF#v}"
              ;;
          esac

          if [ -n "$package_version" ]; then
            if [[ ! "$package_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z]+(\.[0-9A-Za-z]+)*)?$ ]]; then
              echo "::error::Source ref '$SOURCE_REF' does not contain a SemVer package version."
              exit 1
            fi

            {
              echo "PACKAGE_VERSION=$package_version"
              echo "MINVERVERSIONOVERRIDE=$package_version"
            } >> "$GITHUB_ENV"
          fi

      - name: Build and pack
        uses: AtyaLibraries/github-workflows/.github/actions/build-pack-nuget@12bd0f142d443058477bcb167bad4b4f063de994
        with:
          solution: ${{ steps.package_inputs.outputs.solution }}
          package-project: ${{ steps.package_inputs.outputs.package_project }}

      - name: Locate package
        id: package
        shell: bash
        run: |
          mapfile -t packages < <(find . -type f -name '*.nupkg' ! -name '*.symbols.nupkg' | sort)

          if [ "${#packages[@]}" -ne 1 ]; then
            printf 'Expected exactly one package, found %s:\n' "${#packages[@]}"
            printf '%s\n' "${packages[@]}"
            exit 1
          fi

          echo "path=${packages[0]}" >> "$GITHUB_OUTPUT"

      - name: Validate package repository metadata
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Add-Type -AssemblyName System.IO.Compression.FileSystem

          $packagePath = $env:PACKAGE_PATH
          $expected = $env:EXPECTED_REPOSITORY_URL.TrimEnd('/')

          $package = [System.IO.Compression.ZipFile]::OpenRead($packagePath)
          try {
            $nuspecEntries = @($package.Entries | Where-Object { $_.FullName.EndsWith('.nuspec', [StringComparison]::OrdinalIgnoreCase) })

            if ($nuspecEntries.Count -ne 1) {
              throw "Expected exactly one nuspec in '$packagePath', found $($nuspecEntries.Count)."
            }

            $stream = $nuspecEntries[0].Open()
            try {
              $reader = New-Object System.IO.StreamReader($stream)
              try {
                [xml]$nuspec = $reader.ReadToEnd()
              }
              finally {
                $reader.Dispose()
              }
            }
            finally {
              $stream.Dispose()
            }

            $actual = [string]$nuspec.package.metadata.repository.url
            $actual = $actual.TrimEnd('/')

            if ($actual.EndsWith('.git', [StringComparison]::OrdinalIgnoreCase)) {
              $actual = $actual.Substring(0, $actual.Length - 4)
            }

            if ($actual -ne $expected) {
              throw "Package repository URL '$actual' does not match source repository '$expected'."
            }

            Write-Output "Package repository URL verified: $actual"
          }
          finally {
            $package.Dispose()
          }
        env:
          PACKAGE_PATH: ${{ steps.package.outputs.path }}
          EXPECTED_REPOSITORY_URL: https://github.com/${{ env.SOURCE_REPOSITORY }}

      - name: Log in to NuGet.org
        id: login
        uses: NuGet/login@ebc737b6fc418a6ca0073cf116ec8dc156d8b81e # v1
        with:
          user: ArsenAsulyan

      - name: Push package
        shell: bash
        run: |
          dotnet nuget push "${{ steps.package.outputs.path }}" \
            --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json

      - name: Attest package provenance
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        with:
          subject-path: ${{ steps.package.outputs.path }}
